<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartbook | Mantenimiento</title>
  <meta name="description" content="Smartbook se encuentra temporalmente en mantenimiento mientras preparamos nuevas mejoras y contenidos.">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
      background:#ffffff;
      color:#1f2937;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:40px 20px;
    }

    .container{
      max-width:700px;
    }

    .logo{
      width:220px;
      max-width:80%;
      margin-bottom:30px;
    }

    h1{
      font-size:42px;
      color:#1827b8;
      margin-bottom:20px;
    }

    p{
      font-size:18px;
      line-height:1.8;
      color:#4b5563;
      margin-bottom:15px;
    }

    .email{
      margin-top:30px;
      font-size:18px;
      font-weight:bold;
    }

    .email a{
      color:#1827b8;
      text-decoration:none;
    }

    footer{
      margin-top:40px;
      color:#9ca3af;
      font-size:14px;
    }

    @media(max-width:768px){
      h1{
        font-size:32px;
      }

      p{
        font-size:16px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="logo.png" alt="Smartbook" class="logo">

    <h1>SMARTBOOK</h1>

    <p>
      Smartbook se encuentra en proceso de renovación y actualización.
    </p>

    <p>
      Estamos trabajando en una nueva etapa para ofrecer mejores contenidos,
      herramientas y experiencias de aprendizaje.
    </p>

    <p>
      Gracias por su comprensión.
    </p>

    <div class="email">
      <a href="mailto:contacto@smartbook.pe">
        contacto@smartbook.pe
      </a>
    </div>

    <footer>
      © Smartbook
    </footer>

  </div>

</body>
</html>
